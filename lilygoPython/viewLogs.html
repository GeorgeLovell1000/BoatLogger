<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Telemetry Logs</title>
    <style>
        body { 
            background: #000; 
            color: #39ff14; 
            font-family: monospace; 
            padding: 10px; 
            margin: 0; 
        }
        textarea { 
            width: 100%; 
            height: 80vh; 
            background: #000; 
            color: #39ff14; 
            border: 1px solid #444; 
            box-sizing: border-box; 
            padding: 10px;
            font-size: 12px;
            border-radius: 4px;
        }
        button { 
            width: 100%; 
            padding: 15px; 
            margin-top: 10px; 
            background: #333; 
            color: #fff; 
            border: 1px solid #555; 
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <textarea id="logViewer" readonly></textarea>
    <button onclick="window.location.href='/'">Back to Control Deck</button>
    <script>
        // Use a timestamp to break the mobile browser cache and force a fresh download
        fetch('/read_logs?nocache=' + Date.now())
            .then(r => r.text())
            .then(t => {
                const v = document.getElementById('logViewer');
                v.value = t;
                v.scrollTop = v.scrollHeight;
            });
    </script>
</body>
</html>
